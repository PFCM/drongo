name: test
on: # TODO: this
  push:
    branches: [main]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    env:
	GOEXPERIMENT: simd
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup go
        uses: actions/setup-go@v6
        with: 
          go-version-file: go.mod
      - name: go test
        run: go test ./...
        
